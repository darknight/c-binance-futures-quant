services:
  # === Infrastructure ===

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant
      POSTGRES_DB: quant
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant"]
      interval: 5s
      timeout: 3s
      retries: 5

  ws-server:
    build:
      context: ./ws/ws-server
      dockerfile: Dockerfile
    ports:
      - "3698:3698"
    restart: unless-stopped

  # === API ===

  web-server:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python run_web_server.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://quant:quant@postgres:5432/quant
      WS_ADDRESS_A: ws://ws-server:3698
      WEB_ADDRESS: web-server
      CANCEL_WEB_ADDRESS: web-server
    ports:
      - "8888:8888"
    depends_on:
      postgres:
        condition: service_healthy
      ws-server:
        condition: service_started
    restart: unless-stopped

  # === Data Collectors ===

  tick-to-ws:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python services/collectors/tickToWs.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://quant:quant@postgres:5432/quant
      WS_ADDRESS_A: ws://ws-server:3698
      SERVER_NAME: tickToWs_0
      MACHINE_INDEX: "0"
      TICK_INSTANCE_COUNT: "1"
    depends_on:
      postgres:
        condition: service_healthy
      ws-server:
        condition: service_started
    restart: unless-stopped

  one-min-kline:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python services/collectors/oneMinKlineToWs.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://quant:quant@postgres:5432/quant
      WS_ADDRESS_A: ws://ws-server:3698
      SERVER_NAME: oneMinKlineToWs_0
      MACHINE_INDEX: "0"
    depends_on:
      postgres:
        condition: service_healthy
      ws-server:
        condition: service_started
    restart: unless-stopped

  special-kline:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python services/collectors/specialOneMinKlineToWs.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://quant:quant@postgres:5432/quant
      WS_ADDRESS_A: ws://ws-server:3698
      SERVER_NAME: specialOneMinKlineToWs_0
      MACHINE_INDEX: "0"
    depends_on:
      postgres:
        condition: service_healthy
      ws-server:
        condition: service_started
    restart: unless-stopped

  # === Trading ===

  simple-trade:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python services/trading/simple_trade.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://quant:quant@postgres:5432/quant
      WS_ADDRESS_A: ws://ws-server:3698
      WEB_ADDRESS: web-server
      CANCEL_WEB_ADDRESS: web-server
      SERVER_NAME: secondOpen_0
      MACHINE_INDEX: "0"
    depends_on:
      postgres:
        condition: service_healthy
      ws-server:
        condition: service_started
      web-server:
        condition: service_started
    restart: unless-stopped

  # === Risk Control ===

  get-position:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python services/risk/getBinancePosition.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://quant:quant@postgres:5432/quant
      WS_ADDRESS_A: ws://ws-server:3698
      SERVER_NAME: getBinancePosition_0
      MACHINE_INDEX: "0"
    depends_on:
      postgres:
        condition: service_healthy
      ws-server:
        condition: service_started
    restart: unless-stopped

  check-timeout:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python services/risk/checkTimeoutOrders.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://quant:quant@postgres:5432/quant
      WEB_ADDRESS: web-server
      CANCEL_WEB_ADDRESS: web-server
      SERVER_NAME: checkTimeoutOrders_0
      MACHINE_INDEX: "0"
      SECOND_OPEN_HOSTS: '["simple-trade"]'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  commission:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python services/risk/commission.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://quant:quant@postgres:5432/quant
      SERVER_NAME: commission_0
      MACHINE_INDEX: "0"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ws-position:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python services/risk/wsPosition.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://quant:quant@postgres:5432/quant
      SERVER_NAME: wsPosition_0
      MACHINE_INDEX: "0"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  maker-stop-loss:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python services/risk/makerStopLoss.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://quant:quant@postgres:5432/quant
      SERVER_NAME: makerStopLoss_0
      MACHINE_INDEX: "0"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  position-risk:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python services/risk/positionRisk.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://quant:quant@postgres:5432/quant
      SERVER_NAME: positionRisk_0
      MACHINE_INDEX: "0"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # === Post-Trade ===

  web-oss-update:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python services/post_trade/webOssUpdate.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://quant:quant@postgres:5432/quant
      WEB_ADDRESS: web-server
      CANCEL_WEB_ADDRESS: web-server
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  position-record:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python services/post_trade/positionRecord.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://quant:quant@postgres:5432/quant
      WS_ADDRESS_A: ws://ws-server:3698
      WEB_ADDRESS: web-server
      CANCEL_WEB_ADDRESS: web-server
    depends_on:
      postgres:
        condition: service_healthy
      ws-server:
        condition: service_started
    restart: unless-stopped

  trades-update:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python services/post_trade/tradesUpdate.py
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://quant:quant@postgres:5432/quant
      WEB_ADDRESS: web-server
      CANCEL_WEB_ADDRESS: web-server
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
